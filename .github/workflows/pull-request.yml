name: Run PR Tests
permissions:
  contents: read

on:
  pull_request:
    branches:
      - master

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint==4.0.5 pylint-django==2.7.0 black==26.3.1

      - name: Run pylint and black
        run: |
          black --check corvee/
          cp corvee/settings.py.example corvee/settings.py
          DJANGO_SETTINGS_MODULE="corvee.settings" pylint --load-plugins=pylint_django corvee

      - name: Run unit tests
        run: |
          python manage.py test
